name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/expense-tracker-api:latest .
          docker push $ECR_REGISTRY/expense-tracker-api:latest

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build --build-arg VITE_API_BASE_URL=/v1 \
            -t $ECR_REGISTRY/expense-tracker-frontend:latest .
          docker push $ECR_REGISTRY/expense-tracker-frontend:latest

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/nginx.conf"
          target: "~/expense-tracker"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY:        ${{ steps.login-ecr.outputs.registry }}
          AWS_REGION:          ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID:      ${{ secrets.AWS_ACCOUNT_ID }}
          DB_PASSWORD:         ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:          ${{ secrets.JWT_SECRET }}
          SERVER_IP:           ${{ secrets.SERVER_IP }}
          DOMAIN:              ${{ secrets.DOMAIN }}
          CERTBOT_EMAIL:       ${{ secrets.CERTBOT_EMAIL }}
          SEED_USER_EMAIL:     ${{ secrets.SEED_USER_EMAIL }}
          SEED_USER_PASSWORD:  ${{ secrets.SEED_USER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,AWS_REGION,AWS_ACCOUNT_ID,DB_PASSWORD,JWT_SECRET,SERVER_IP,DOMAIN,CERTBOT_EMAIL,SEED_USER_EMAIL,SEED_USER_PASSWORD
          script_stop: true
          script: |
            set -e
            DOMAIN_OR_IP="${DOMAIN:-$SERVER_IP}"

            # 1. Install nginx + certbot if not present
            if ! command -v nginx &>/dev/null; then
              docker ps -q --filter "publish=80" | xargs -r docker stop || true
              sudo apt-get update -qq
              sudo apt-get install -y nginx certbot python3-certbot-nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            # 2. Write nginx config from the SCP'd file (sed replaces __DOMAIN__)
            sed "s/__DOMAIN__/${DOMAIN_OR_IP}/g" \
              ~/expense-tracker/deploy/nginx.conf \
              | sudo tee /etc/nginx/sites-available/expense-tracker > /dev/null

            sudo ln -sf /etc/nginx/sites-available/expense-tracker \
                        /etc/nginx/sites-enabled/expense-tracker
            sudo rm -f  /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx

            # 3. Get SSL cert (skipped if cert already exists)
            if [ -n "$DOMAIN" ] && [ ! -f "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem" ]; then
              sudo certbot --nginx --non-interactive --agree-tos \
                --email "${CERTBOT_EMAIL}" -d "${DOMAIN}"
              sudo systemctl reload nginx
            fi

            # 4. Login to ECR
            aws ecr get-login-password --region "${AWS_REGION}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # 5. Write .env using printf (no heredoc — avoids YAML issues)
            mkdir -p ~/expense-tracker
            printf 'DB_PASSWORD=%s\n'        "${DB_PASSWORD}"        >  ~/expense-tracker/.env
            printf 'JWT_SECRET=%s\n'         "${JWT_SECRET}"         >> ~/expense-tracker/.env
            printf 'SERVER_IP=%s\n'          "${SERVER_IP}"          >> ~/expense-tracker/.env
            printf 'AWS_ACCOUNT_ID=%s\n'     "${AWS_ACCOUNT_ID}"     >> ~/expense-tracker/.env
            printf 'AWS_REGION=%s\n'         "${AWS_REGION}"         >> ~/expense-tracker/.env
            printf 'DB_USER=%s\n'            "postgres"              >> ~/expense-tracker/.env
            printf 'DB_NAME=%s\n'            "expense_tracker"       >> ~/expense-tracker/.env
            printf 'SEED_USER_EMAIL=%s\n'    "${SEED_USER_EMAIL}"    >> ~/expense-tracker/.env
            printf 'SEED_USER_PASSWORD=%s\n' "${SEED_USER_PASSWORD}" >> ~/expense-tracker/.env

            # 6. Pull new images and restart
            cd ~/expense-tracker
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Deploy complete - ${DOMAIN_OR_IP}"
