name: expense_tracker_app
description: "A new Flutter project for personal expense tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  intl: ^0.19.0
  timeago: ^3.6.1
  logger: ^2.0.2
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.0
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#6750A4"
  image: assets/icon/app_icon.png
  android_12:
    color: "#6750A4"
    image: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
